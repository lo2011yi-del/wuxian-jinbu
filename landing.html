<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无限进步 - AI驱动的学习平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .landing-container {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            z-index: 1;
        }
        
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        
        .brand-section {
            text-align: center;
            margin-bottom: 60px;
        }
        
        .brand-icon {
            font-size: 80px;
            margin-bottom: 20px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .brand-title {
            font-size: 72px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
            letter-spacing: 8px;
        }
        
        .brand-subtitle {
            font-size: 24px;
            color: rgba(255,255,255,0.9);
            margin-bottom: 10px;
            font-weight: 300;
        }
        
        .brand-description {
            font-size: 16px;
            color: rgba(255,255,255,0.7);
            max-width: 600px;
            line-height: 1.8;
        }
        
        .features-section {
            display: flex;
            gap: 30px;
            margin-bottom: 60px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .feature-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 30px;
            width: 280px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }
        
        .feature-card:hover {
            transform: translateY(-10px);
            background: rgba(255,255,255,0.15);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .feature-icon {
            font-size: 48px;
            margin-bottom: 20px;
            display: block;
        }
        
        .feature-title {
            font-size: 20px;
            color: #fff;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .feature-desc {
            font-size: 14px;
            color: rgba(255,255,255,0.8);
            line-height: 1.6;
        }
        
        .enter-section {
            text-align: center;
        }
        
        .enter-btn {
            display: inline-block;
            padding: 20px 60px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #fff;
            font-size: 20px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4);
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        
        .enter-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(245, 87, 108, 0.5);
        }
        
        .footer-text {
            margin-top: 40px;
            font-size: 14px;
            color: rgba(255,255,255,0.6);
        }
        
        @media (max-width: 768px) {
            .brand-title {
                font-size: 42px;
                letter-spacing: 4px;
            }
            
            .brand-subtitle {
                font-size: 18px;
            }
            
            .features-section {
                flex-direction: column;
                align-items: center;
            }
            
            .feature-card {
                width: 100%;
                max-width: 320px;
            }
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    
    <div class="landing-container">
        <div class="brand-section">
            <span class="brand-icon">🚀</span>
            <h1 class="brand-title">无限进步</h1>
            <p class="brand-subtitle">AI驱动的个性化学习系统</p>
            <p class="brand-description">
                根据你的需求生成专属课程，AI助教全程陪伴，让学习更高效、更有趣
            </p>
        </div>
        
        <div class="features-section">
            <div class="feature-card">
                <span class="feature-icon">🤖</span>
                <h3 class="feature-title">AI 智能规划</h3>
                <p class="feature-desc">输入学习目标，AI 自动生成系统化课程大纲</p>
            </div>
            <div class="feature-card">
                <span class="feature-icon">📚</span>
                <h3 class="feature-title">个性化学习</h3>
                <p class="feature-desc">根据你的进度和偏好，定制专属学习内容</p>
            </div>
            <div class="feature-card">
                <span class="feature-icon">🎯</span>
                <h3 class="feature-title">知识体系化</h3>
                <p class="feature-desc">循序渐进的学习路径，构建完整知识框架</p>
            </div>
        </div>
        
        <div class="enter-section">
            <a href="index.html" class="enter-btn">进入系统</a>
            <p class="footer-text">开启你的学习之旅</p>
        </div>
    </div>
    
    <script>
        // 粒子动画
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const particles = [];
        const particleCount = 50;
        
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function init() {
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }
        
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            
            // 连线
            for (let i = 0; i < particles.length; i++) {
                for (let j = i; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < 150) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(255, 255, 255, ${0.1 * (1 - distance / 150)})`;
                        ctx.lineWidth = 1;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            
            requestAnimationFrame(animate);
        }
        
        init();
        animate();
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
