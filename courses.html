<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的课程 - 个人学习系统</title>
    <link rel="stylesheet" href="css/style.css?v=104">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="layout">
        <header class="top-nav">
            <div class="nav-brand">
                <span class="brand-icon">📚</span>
                <span class="brand-text">个人学习系统</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">🏠 首页</a>
                <a href="courses.html" class="nav-item active">📖 我的课程</a>
                <a href="settings.html" class="nav-item">⚙️ 设置</a>
            </nav>
            <div class="nav-user">
                <a href="auth.html" class="user-login-btn">👤 登录</a>
            </div>
        </header>

        <main class="main-container">
            <div class="page-header">
                <h1>📖 我的课程</h1>
                <p>管理你的所有学习内容</p>
            </div>

            <div class="courses-toolbar">
                <div class="course-tabs">
                    <button class="tab-btn active" data-filter="all">全部</button>
                    <button class="tab-btn" data-filter="active">进行中</button>
                    <button class="tab-btn" data-filter="completed">已完成</button>
                </div>
                <a href="create-course.html" class="btn btn-primary">➕ 创建新课程</a>
            </div>

            <div class="courses-grid" id="coursesGrid"></div>

            <div class="empty-state" id="emptyState" style="display: none;">
                <span class="empty-icon">📚</span>
                <h3>还没有课程</h3>
                <p>创建你的第一门课程，开始学习之旅</p>
                <a href="create-course.html" class="btn btn-primary">创建课程</a>
            </div>
        </main>

        <footer class="footer">
            <p>个人学习系统 v1.0 | 数据存储在本地</p>
        </footer>
    </div>

    <script src="js/storage.js?v=104"></script>
    <script src="js/ai-service.js?v=104"></script>
    <script src="js/app.js?v=104"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            app.updateNavUser();
            app.initCoursesPage();
        });
    </script>
</body>
</html>
