<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程详情 - 个人学习系统</title>
    <link rel="stylesheet" href="css/style.css?v=104">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        .course-detail-page {
            max-width: 1200px;
        }
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .breadcrumb a {
            color: var(--text-secondary);
            text-decoration: none;
        }
        .breadcrumb a:hover {
            color: var(--primary-color);
        }
        .breadcrumb span {
            color: var(--text-tertiary);
        }
        .course-header-card {
            background: white;
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            margin-bottom: 24px;
        }
        .course-header-content {
            display: grid;
            grid-template-columns: 100px 1fr auto;
            gap: 32px;
            align-items: start;
        }
        .course-icon-large {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        .course-header-info h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0 0 12px 0;
        }
        .course-header-info p {
            font-size: 15px;
            color: var(--text-secondary);
            margin: 0 0 16px 0;
            line-height: 1.6;
        }
        .course-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .tag {
            font-size: 13px;
            padding: 6px 14px;
            background: var(--gray-100);
            color: var(--text-secondary);
            border-radius: 20px;
        }
        .tag.primary {
            background: var(--primary-light);
            color: var(--primary-color);
        }
        .course-header-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .course-stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            margin-bottom: 24px;
        }
        .stat-box {
            text-align: center;
            padding: 16px;
            background: var(--gray-50);
            border-radius: 12px;
        }
        .stat-box .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 4px;
        }
        .stat-box .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .detail-content {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
        }
        .detail-sidebar {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .progress-card, .next-lesson-card, .outline-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        .progress-card h3, .outline-card h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0 0 20px 0;
        }
        .progress-circle-container {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }
        .progress-circle {
            position: relative;
            width: 140px;
            height: 140px;
        }
        .progress-circle svg {
            transform: rotate(-90deg);
        }
        .progress-circle circle {
            fill: none;
            stroke-width: 10;
        }
        .progress-bg {
            stroke: var(--gray-200);
        }
        .progress-bar {
            stroke: var(--primary-color);
            stroke-linecap: round;
            stroke-dasharray: 377;
            stroke-dashoffset: 377;
            transition: stroke-dashoffset 0.5s ease;
        }
        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .progress-text .percent {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary-color);
        }
        .progress-text .label {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .progress-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            text-align: center;
        }
        .progress-stat .value {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .progress-stat .label {
            font-size: 12px;
            color: var(--text-tertiary);
        }
        .time-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }
        .time-info-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }
        .time-info-row .label {
            color: var(--text-tertiary);
        }
        .time-info-row .value {
            color: var(--text-primary);
            font-weight: 500;
        }
        .next-lesson-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .next-lesson-card h3 {
            color: white;
            margin: 0 0 16px 0;
        }
        .next-lesson-info .label {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 4px;
        }
        .next-lesson-info .title {
            font-size: 16px;
            font-weight: 600;
            margin: 0 0 8px 0;
        }
        .next-lesson-info .desc {
            font-size: 13px;
            opacity: 0.8;
            margin: 0 0 16px 0;
            line-height: 1.5;
        }
        .outline-card {
            grid-column: span 2;
        }
        .outline-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .outline-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            background: var(--gray-50);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid transparent;
        }
        .outline-item:hover {
            background: var(--primary-light);
        }
        .outline-item.completed {
            border-left-color: var(--success-color);
        }
        .outline-item.active {
            border-left-color: var(--primary-color);
            background: var(--primary-light);
        }
        .lesson-number {
            width: 36px;
            height: 36px;
            background: var(--primary-color);
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            flex-shrink: 0;
        }
        .outline-item.completed .lesson-number {
            background: var(--success-color);
        }
        .lesson-info {
            flex: 1;
        }
        .lesson-info h4 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0 0 4px 0;
        }
        .lesson-info p {
            font-size: 13px;
            color: var(--text-secondary);
            margin: 0;
        }
        .lesson-status {
            font-size: 20px;
        }
        @media (max-width: 1024px) {
            .detail-content {
                grid-template-columns: 1fr;
            }
            .outline-card {
                grid-column: span 1;
            }
        }
        @media (max-width: 768px) {
            .course-header-content {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .course-icon-large {
                margin: 0 auto;
            }
            .course-tags {
                justify-content: center;
            }
            .course-header-actions {
                flex-direction: row;
                justify-content: center;
            }
            .course-stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="layout">
        <header class="top-nav">
            <div class="nav-brand">
                <span class="brand-icon">📚</span>
                <span class="brand-text">个人学习系统</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">🏠 首页</a>
                <a href="courses.html" class="nav-item">📖 我的课程</a>
                <a href="settings.html" class="nav-item">⚙️ 设置</a>
            </nav>
            <div class="nav-user">
                <span class="ai-badge" id="aiStatus">🟢 AI 就绪</span>
                <a href="auth.html" class="user-login-btn">👤 登录</a>
            </div>
        </header>

        <main class="main-container course-detail-page">
            <!-- 面包屑导航 -->
            <div class="breadcrumb">
                <a href="index.html">首页</a>
                <span>›</span>
                <a href="courses.html">我的课程</a>
                <span>›</span>
                <span id="breadcrumbCourseName">课程详情</span>
            </div>

            <!-- 课程头部卡片 -->
            <div class="course-header-card">
                <div class="course-header-content">
                    <div class="course-icon-large" id="courseCover">📖</div>
                    <div class="course-header-info">
                        <h1 id="courseTitle">--</h1>
                        <p id="courseDescription">--</p>
                        <div class="course-tags" id="courseTags"></div>
                    </div>
                    <div class="course-header-actions">
                        <button class="btn btn-primary" onclick="app.continueLearning()">📖 继续学习</button>
                        <button class="btn btn-outline" onclick="app.editOutline()">✏️ 编辑大纲</button>
                        <button class="btn btn-outline" onclick="app.deleteCourse()">🗑️ 删除课程</button>
                    </div>
                </div>
            </div>

            <!-- 统计信息栏 -->
            <div class="course-stats-bar">
                <div class="stat-box">
                    <div class="stat-value" id="courseLevel">--</div>
                    <div class="stat-label">难度等级</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="totalLessons">--</div>
                    <div class="stat-label">总课时</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="dailyTime">--</div>
                    <div class="stat-label">每日学习</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="createTime">--</div>
                    <div class="stat-label">创建时间</div>
                </div>
            </div>

            <!-- 详细内容 -->
            <div class="detail-content">
                <!-- 左侧边栏 -->
                <div class="detail-sidebar">
                    <!-- 进度卡片 -->
                    <div class="progress-card">
                        <h3>学习进度</h3>
                        <div class="progress-circle-container">
                            <div class="progress-circle">
                                <svg width="140" height="140">
                                    <circle class="progress-bg" cx="70" cy="70" r="60"></circle>
                                    <circle class="progress-bar" id="progressCircleBar" cx="70" cy="70" r="60"></circle>
                                </svg>
                                <div class="progress-text">
                                    <div class="percent" id="progressPercent">0%</div>
                                    <div class="label">已完成</div>
                                </div>
                            </div>
                        </div>
                        <div class="progress-stats">
                            <div class="progress-stat">
                                <div class="value" id="completedCount">0</div>
                                <div class="label">已完成</div>
                            </div>
                            <div class="progress-stat">
                                <div class="value" id="inProgressCount">0</div>
                                <div class="label">进行中</div>
                            </div>
                            <div class="progress-stat">
                                <div class="value" id="notStartedCount">0</div>
                                <div class="label">未开始</div>
                            </div>
                        </div>
                        <div class="time-info">
                            <div class="time-info-row">
                                <span class="label">预计总时长</span>
                                <span class="value" id="estimatedTime">--</span>
                            </div>
                            <div class="time-info-row">
                                <span class="label">实际学习时长</span>
                                <span class="value" id="actualTime">--</span>
                            </div>
                        </div>
                    </div>

                    <!-- 下一节课卡片 -->
                    <div class="next-lesson-card" id="nextLessonCard" style="display: none;">
                        <h3>🎯 下一节课</h3>
                        <div class="next-lesson-info">
                            <div class="label">继续学习</div>
                            <div class="title" id="nextLessonTitle">--</div>
                            <p class="desc" id="nextLessonDesc">--</p>
                        </div>
                        <button class="btn btn-white" onclick="app.startNextLesson()" style="width: 100%;">
                            开始学习 ➜
                        </button>
                    </div>
                </div>

                <!-- 右侧大纲卡片 -->
                <div class="outline-card">
                    <h3>📋 课程大纲</h3>
                    <div class="outline-list" id="outlineList"></div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>个人学习系统 v1.0 | 数据存储在本地</p>
        </footer>
    </div>

    <script src="js/storage.js?v=104"></script>
    <script src="js/ai-service.js?v=104"></script>
    <script src="js/app.js?v=104"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            app.updateNavUser();
            app.initCourseDetailPage();
        });
    </script>
</body>
</html>
